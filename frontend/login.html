<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - 考研智能辅导系统</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    :root {
      --primary: #1e3a8a;
      --primary-hover: #1e40af;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    .login-card {
      width: 100%; max-width: 400px;
      background: #fff; border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px 36px;
    }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo .icon { font-size: 2.6rem; color: var(--primary); display: block; margin-bottom: 10px; }
    .login-logo h1 { font-size: 1.35rem; font-weight: 700; color: #1e293b; margin: 0; }
    .login-logo .subtitle { font-size: 0.82rem; color: #64748b; margin-top: 4px; }
    .form-label { font-weight: 600; font-size: 0.875rem; color: #475569; }
    .form-control {
      border-radius: 8px; border: 1.5px solid #e2e8f0;
      padding: 10px 14px; font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(30,58,138,0.12);
    }
    .btn-login {
      width: 100%; padding: 11px; border-radius: 8px;
      background: var(--primary); border: none; color: #fff;
      font-weight: 600; font-size: 0.95rem;
      transition: background 0.2s, transform 0.1s;
      cursor: pointer;
    }
    .btn-login:hover { background: var(--primary-hover); }
    .btn-login:active { transform: scale(0.98); }
    .demo-hint {
      background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;
      padding: 12px 14px; margin-top: 20px; font-size: 0.8rem; color: #64748b;
    }
    .demo-hint strong { color: #475569; }
    .demo-hint .demo-row { display: flex; gap: 6px; align-items: center; margin-top: 4px; }
    .demo-hint code {
      background: #e2e8f0; border-radius: 4px; padding: 1px 6px;
      font-size: 0.78rem; color: #334155;
    }
    .error-msg {
      display: none; background: #fff5f5; border: 1px solid #fecaca;
      border-radius: 8px; padding: 10px 14px; color: #b91c1c;
      font-size: 0.85rem; margin-top: 12px;
    }
    .pw-wrapper { position: relative; }
    .pw-toggle {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #94a3b8; cursor: pointer; padding: 0;
      line-height: 1;
    }
    .pw-toggle:hover { color: #64748b; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <i class="bi bi-mortarboard-fill icon"></i>
      <h1>考研智能辅导系统</h1>
      <p class="subtitle">AI-powered Graduate Exam Assistant</p>
    </div>

    <form id="login-form" novalidate>
      <div class="mb-3">
        <label class="form-label" for="username"><i class="bi bi-person me-1"></i>用户名</label>
        <input id="username" type="text" class="form-control" placeholder="请输入用户名" autocomplete="username" />
      </div>
      <div class="mb-4">
        <label class="form-label" for="password"><i class="bi bi-lock me-1"></i>密码</label>
        <div class="pw-wrapper">
          <input id="password" type="password" class="form-control pe-5" placeholder="请输入密码" autocomplete="current-password" />
          <button type="button" class="pw-toggle" id="toggle-pw" tabindex="-1">
            <i class="bi bi-eye" id="pw-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>登&nbsp;&nbsp;录
      </button>
      <div class="error-msg" id="error-msg">
        <i class="bi bi-exclamation-circle me-1"></i><span id="error-text">用户名或密码错误</span>
      </div>
    </form>

    <div class="demo-hint">
      <strong><i class="bi bi-info-circle me-1"></i>演示账号（密码均为 exam2024）：</strong>
      <div class="demo-row"><code>user_001</code> <span>数学偏弱</span></div>
      <div class="demo-row"><code>user_002</code> <span>政治偏弱</span></div>
      <div class="demo-row"><code>user_003</code> <span>英语偏弱</span></div>
    </div>
  </div>

  <script>
    const DEMO_USERS = {
      'user_001': { password: 'exam2024', displayName: '同学甲', subject: '数学偏弱', initials: '甲' },
      'user_002': { password: 'exam2024', displayName: '同学乙', subject: '政治偏弱', initials: '乙' },
      'user_003': { password: 'exam2024', displayName: '同学丙', subject: '英语偏弱', initials: '丙' },
    };

    // Redirect if already logged in
    if (localStorage.getItem('auth_token')) {
      window.location.replace('index.html');
    }

    // Toggle password visibility
    document.getElementById('toggle-pw').addEventListener('click', () => {
      const pw = document.getElementById('password');
      const eye = document.getElementById('pw-eye');
      if (pw.type === 'password') {
        pw.type = 'text';
        eye.className = 'bi bi-eye-slash';
      } else {
        pw.type = 'password';
        eye.className = 'bi bi-eye';
      }
    });

    // Login form submit
    document.getElementById('login-form').addEventListener('submit', e => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');
      const errorText = document.getElementById('error-text');

      if (!username) {
        errorMsg.style.display = 'block';
        errorText.textContent = '请输入用户名';
        return;
      }

      const user = DEMO_USERS[username];
      if (!user || user.password !== password) {
        errorMsg.style.display = 'block';
        errorText.textContent = '用户名或密码错误';
        document.getElementById('password').value = '';
        return;
      }

      errorMsg.style.display = 'none';
      // Save auth info to localStorage
      const token = btoa(username + ':' + Date.now());
      localStorage.setItem('auth_token', token);
      localStorage.setItem('user_id', username);
      localStorage.setItem('display_name', user.displayName);
      localStorage.setItem('user_subject', user.subject);
      localStorage.setItem('user_initials', user.initials);
      window.location.replace('index.html');
    });

    // Enter key on username field moves focus to password
    document.getElementById('username').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('password').focus();
      }
    });
  </script>
</body>
</html>
