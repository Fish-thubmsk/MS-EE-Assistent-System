<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>注册 - 考研智能辅导系统</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    :root {
      --primary: #1e3a8a;
      --primary-hover: #1e40af;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    .register-card {
      width: 100%; max-width: 420px;
      background: #fff; border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px 36px;
    }
    .card-logo { text-align: center; margin-bottom: 28px; }
    .card-logo .icon { font-size: 2.6rem; color: var(--primary); display: block; margin-bottom: 10px; }
    .card-logo h1 { font-size: 1.35rem; font-weight: 700; color: #1e293b; margin: 0; }
    .card-logo .subtitle { font-size: 0.82rem; color: #64748b; margin-top: 4px; }
    .form-label { font-weight: 600; font-size: 0.875rem; color: #475569; }
    .form-control {
      border-radius: 8px; border: 1.5px solid #e2e8f0;
      padding: 10px 14px; font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(30,58,138,0.12);
    }
    .btn-register {
      width: 100%; padding: 11px; border-radius: 8px;
      background: var(--primary); border: none; color: #fff;
      font-weight: 600; font-size: 0.95rem;
      transition: background 0.2s, transform 0.1s;
      cursor: pointer;
    }
    .btn-register:hover { background: var(--primary-hover); }
    .btn-register:active { transform: scale(0.98); }
    .btn-register:disabled { opacity: 0.7; cursor: not-allowed; }
    .error-msg {
      display: none; background: #fff5f5; border: 1px solid #fecaca;
      border-radius: 8px; padding: 10px 14px; color: #b91c1c;
      font-size: 0.85rem; margin-top: 12px;
    }
    .success-msg {
      display: none; background: #f0fdf4; border: 1px solid #bbf7d0;
      border-radius: 8px; padding: 10px 14px; color: #166534;
      font-size: 0.85rem; margin-top: 12px;
    }
    .pw-wrapper { position: relative; }
    .pw-toggle {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #94a3b8; cursor: pointer; padding: 0;
      line-height: 1;
    }
    .pw-toggle:hover { color: #64748b; }
    .form-text { font-size: 0.78rem; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="register-card">
    <div class="card-logo">
      <i class="bi bi-mortarboard-fill icon"></i>
      <h1>考研智能辅导系统</h1>
      <p class="subtitle">创建新账号</p>
    </div>

    <form id="register-form" novalidate>
      <div class="mb-3">
        <label class="form-label" for="username"><i class="bi bi-person me-1"></i>用户名 <span class="text-danger">*</span></label>
        <input id="username" type="text" class="form-control" placeholder="3-50 个字符" autocomplete="username" />
        <div class="form-text">字母、数字或下划线，3-50 位</div>
      </div>
      <div class="mb-3">
        <label class="form-label" for="display_name"><i class="bi bi-badge-person me-1"></i>昵称</label>
        <input id="display_name" type="text" class="form-control" placeholder="可选，显示名称" autocomplete="nickname" />
      </div>
      <div class="mb-3">
        <label class="form-label" for="email"><i class="bi bi-envelope me-1"></i>邮箱</label>
        <input id="email" type="email" class="form-control" placeholder="可选" autocomplete="email" />
      </div>
      <div class="mb-3">
        <label class="form-label" for="password"><i class="bi bi-lock me-1"></i>密码 <span class="text-danger">*</span></label>
        <div class="pw-wrapper">
          <input id="password" type="password" class="form-control pe-5" placeholder="至少 6 位" autocomplete="new-password" />
          <button type="button" class="pw-toggle" id="toggle-pw" tabindex="-1">
            <i class="bi bi-eye" id="pw-eye"></i>
          </button>
        </div>
        <div class="form-text">至少 6 个字符</div>
      </div>
      <div class="mb-4">
        <label class="form-label" for="confirm_password"><i class="bi bi-lock-fill me-1"></i>确认密码 <span class="text-danger">*</span></label>
        <input id="confirm_password" type="password" class="form-control" placeholder="再次输入密码" autocomplete="new-password" />
      </div>
      <button type="submit" class="btn-register">
        <i class="bi bi-person-plus me-2"></i>注&nbsp;&nbsp;册
      </button>
      <div class="error-msg" id="error-msg">
        <i class="bi bi-exclamation-circle me-1"></i><span id="error-text">注册失败</span>
      </div>
      <div class="success-msg" id="success-msg">
        <i class="bi bi-check-circle me-1"></i><span id="success-text">注册成功，正在跳转…</span>
      </div>
    </form>

    <div class="text-center mt-3" style="font-size:0.85rem;color:#64748b;">
      已有账号？<a href="login.html" style="color:var(--primary);text-decoration:none;font-weight:600;">立即登录</a>
    </div>
  </div>

  <script>
    const API_BASE = (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost')
      ? 'http://localhost:8000'
      : '';

    // Redirect if already logged in
    if (localStorage.getItem('auth_token')) {
      window.location.replace('index.html');
    }

    // Toggle password visibility
    document.getElementById('toggle-pw').addEventListener('click', () => {
      const pw = document.getElementById('password');
      const eye = document.getElementById('pw-eye');
      if (pw.type === 'password') {
        pw.type = 'text';
        eye.className = 'bi bi-eye-slash';
      } else {
        pw.type = 'password';
        eye.className = 'bi bi-eye';
      }
    });

    // Register form submit
    document.getElementById('register-form').addEventListener('submit', async e => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const display_name = document.getElementById('display_name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm_password = document.getElementById('confirm_password').value;
      const errorMsg = document.getElementById('error-msg');
      const errorText = document.getElementById('error-text');
      const successMsg = document.getElementById('success-msg');
      const btnReg = document.querySelector('.btn-register');

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      if (!username || username.length < 3) {
        errorMsg.style.display = 'block';
        errorText.textContent = '用户名至少 3 个字符';
        return;
      }
      if (!password || password.length < 6) {
        errorMsg.style.display = 'block';
        errorText.textContent = '密码至少 6 个字符';
        return;
      }
      if (password !== confirm_password) {
        errorMsg.style.display = 'block';
        errorText.textContent = '两次输入的密码不一致';
        document.getElementById('confirm_password').value = '';
        return;
      }

      btnReg.disabled = true;
      btnReg.innerHTML = '<i class="bi bi-hourglass-split me-2"></i>注册中…';

      try {
        const body = { username, password };
        if (display_name) body.display_name = display_name;
        if (email) body.email = email;

        const resp = await fetch(`${API_BASE}/api/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (resp.ok || resp.status === 201) {
          const data = await resp.json();
          // Auto-login after registration
          localStorage.setItem('auth_token', data.access_token);
          localStorage.setItem('user_id', String(data.user_id));
          localStorage.setItem('display_name', data.display_name || data.username);
          localStorage.setItem('username', data.username);
          successMsg.style.display = 'block';
          document.getElementById('success-text').textContent = '注册成功，正在跳转…';
          setTimeout(() => window.location.replace('index.html'), 1000);
        } else {
          const err = await resp.json().catch(() => ({}));
          errorMsg.style.display = 'block';
          errorText.textContent = err.detail || '注册失败，请稍后重试';
        }
      } catch (err) {
        errorMsg.style.display = 'block';
        errorText.textContent = '网络错误，请检查后端服务是否已启动';
      } finally {
        btnReg.disabled = false;
        btnReg.innerHTML = '<i class="bi bi-person-plus me-2"></i>注&nbsp;&nbsp;册';
      }
    });
  </script>
</body>
</html>
