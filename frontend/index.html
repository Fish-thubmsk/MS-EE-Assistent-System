<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>考研智能辅导系统</title>
  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <!-- marked.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <!-- Chart.js for diagnosis visualization -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- MathJax for LaTeX formula rendering -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      svg: { fontCache: 'global' },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'] }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <style>
    :root {
      --primary: #1e3a8a;
      --primary-hover: #1e40af;
      --primary-light: #dbeafe;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-2: #64748b;
      --text-muted: #94a3b8;
      --sidebar-w: 248px;
    }
    * { box-sizing: border-box; }
    body {
      height: 100vh; overflow: hidden;
      display: flex; flex-direction: column;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: var(--text); background: var(--surface-2);
    }
    /* ── Navbar ─────────────────────────────────── */
    #topnav {
      background: var(--primary); color: #fff;
      display: flex; align-items: center; padding: 0 14px;
      height: 52px; gap: 10px; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    .nav-sidebar-toggle {
      background: none; border: none; color: rgba(255,255,255,0.8);
      cursor: pointer; padding: 4px 6px; border-radius: 6px;
      font-size: 1.1rem; line-height: 1; transition: background 0.15s;
    }
    .nav-sidebar-toggle:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .nav-brand { font-size: 1rem; font-weight: 700; white-space: nowrap; letter-spacing: -0.01em; }
    .nav-brand i { margin-right: 6px; }
    .nav-divider { width: 1px; height: 22px; background: rgba(255,255,255,0.2); margin: 0 4px; }
    #mode-tabs { display: flex; gap: 4px; }
    #mode-tabs button {
      padding: 5px 12px; font-size: 0.82rem; font-weight: 500;
      border-radius: 6px; border: none; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    #mode-tabs button.active { background: rgba(255,255,255,0.22); color: #fff; }
    #mode-tabs button:not(.active) { background: transparent; color: rgba(255,255,255,0.72); }
    #mode-tabs button:not(.active):hover { background: rgba(255,255,255,0.1); color: #fff; }
    .nav-spacer { flex: 1; }
    #nav-api-status { font-size: 0.75rem; color: rgba(255,255,255,0.5); white-space: nowrap; }
    #nav-user { display: flex; align-items: center; gap: 8px; }
    .user-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(255,255,255,0.22);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .user-name { font-size: 0.82rem; color: rgba(255,255,255,0.88); }
    .btn-logout {
      padding: 4px 10px; font-size: 0.75rem;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px; background: transparent; color: rgba(255,255,255,0.75);
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.5); }
    /* ── App layout ──────────────────────────────── */
    #app { flex: 1; display: flex; overflow: hidden; position: relative; }
    /* ── Sidebar ─────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
      transition: width 0.22s ease, border-width 0.22s ease;
    }
    #sidebar.collapsed { width: 0; border-right-width: 0; }
    #sidebar-inner {
      width: var(--sidebar-w); min-width: var(--sidebar-w);
      display: flex; flex-direction: column; overflow-y: auto;
      padding: 12px; flex: 1;
    }
    .sidebar-section { margin-bottom: 16px; }
    .sidebar-label {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-muted);
      margin-bottom: 6px; padding: 0 2px;
    }
    /* User card in sidebar */
    .sidebar-user-card {
      background: var(--primary-light); border-radius: 8px;
      padding: 10px 12px; margin-bottom: 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .sidebar-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--primary); display: flex; align-items: center;
      justify-content: center; font-size: 0.85rem; font-weight: 700;
      color: #fff; flex-shrink: 0;
    }
    .sidebar-user-info .name { font-size: 0.88rem; font-weight: 600; color: var(--text); }
    .sidebar-user-info .uid { font-size: 0.72rem; color: var(--text-2); margin-top: 1px; }
    /* ── Main area ───────────────────────────────── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    /* ── Chat area ───────────────────────────────── */
    #chat-box {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
      background: var(--surface-2);
    }
    .msg-user { align-self: flex-end; }
    .msg-assistant { align-self: flex-start; }
    .msg-bubble {
      max-width: 75%; padding: 10px 14px; border-radius: 12px;
      word-break: break-word; font-size: 0.88rem; line-height: 1.55;
    }
    .msg-user .msg-bubble {
      background: var(--primary); color: #fff;
      border-bottom-right-radius: 4px;
      white-space: pre-wrap;
    }
    .msg-assistant .msg-bubble {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-bottom-left-radius: 4px;
    }
    /* Markdown inside assistant bubbles */
    .msg-assistant .msg-bubble p { margin: 0 0 8px; }
    .msg-assistant .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-assistant .msg-bubble pre {
      background: #f1f5f9; padding: 10px 12px; border-radius: 6px;
      font-size: 0.8rem; overflow-x: auto; margin: 8px 0;
    }
    .msg-assistant .msg-bubble code {
      background: #f1f5f9; padding: 1px 5px; border-radius: 4px; font-size: 0.82em;
    }
    .msg-assistant .msg-bubble pre code { background: none; padding: 0; }
    .msg-assistant .msg-bubble ul, .msg-assistant .msg-bubble ol { padding-left: 20px; margin: 6px 0; }
    .msg-assistant .msg-bubble blockquote {
      border-left: 3px solid var(--border); padding-left: 10px;
      color: var(--text-2); margin: 6px 0;
    }
    /* ── Input row ───────────────────────────────── */
    .input-bar {
      border-top: 1px solid var(--border); padding: 10px 16px;
      background: var(--surface); display: flex; gap: 8px; align-items: flex-end;
    }
    .input-bar textarea {
      border-radius: 8px; border: 1.5px solid var(--border);
      padding: 8px 12px; font-size: 0.88rem; resize: none; flex: 1;
      transition: border-color 0.2s;
    }
    .input-bar textarea:focus { outline: none; border-color: var(--primary); }
    /* ── Question card ───────────────────────────── */
    #question-card { margin: 12px 16px; }
    /* Subject color labels */
    .subject-tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
    }
    .subject-math    { background: #dbeafe; color: #1d4ed8; }
    .subject-politics { background: #fee2e2; color: #b91c1c; }
    .subject-english { background: #d1fae5; color: #065f46; }
    .subject-default { background: #f1f5f9; color: #475569; }
    /* Progress bar for question */
    .question-progress { font-size: 0.75rem; color: var(--text-2); }
    /* Passage text for English questions */
    .q-passage {
      background: #f8faff; border: 1px solid #e2eaff;
      border-radius: 8px; padding: 10px 14px; margin-bottom: 10px;
      font-size: 0.82rem; line-height: 1.75; color: #29334a;
      white-space: pre-wrap; max-height: 220px; overflow-y: auto;
    }
    /* Multiple choice options */
    .q-options { display: grid; gap: 8px; margin-top: 10px; }
    .q-option {
      border: 1.5px solid var(--border); border-radius: 10px;
      padding: 10px 12px; display: grid;
      grid-template-columns: 30px 1fr; gap: 8px; align-items: start;
      background: #fff; cursor: pointer; transition: all .15s ease;
      font-size: 0.85rem; line-height: 1.6;
    }
    .q-option:hover { border-color: #b9c8f8; background: #f5f8ff; }
    .q-option.selected { border-color: #3b82f6; background: #eff6ff; }
    .q-option.correct  { border-color: #16a34a; background: #f0fdf4; pointer-events: none; }
    .q-option.wrong    { border-color: #dc2626; background: #fef2f2; pointer-events: none; }
    .q-option-badge {
      width: 28px; height: 28px; border-radius: 50%;
      background: #edf2ff; color: #2848b8;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.82rem; flex-shrink: 0;
    }
    /* Answer reveal box */
    .q-answer-box {
      margin-top: 10px; padding: 8px 12px; border-radius: 8px;
      background: #ecfdf5; border: 1px solid #bbf7d0;
      color: #166534; font-size: 0.82rem; display: none;
    }
    .q-answer-box.show { display: block; }
    .q-answer-box.wrong-ans { background: #fff7ed; border-color: #fed7aa; color: #9a3412; }
    /* Submit button for options */
    .q-submit-btn {
      margin-top: 10px; padding: 7px 18px;
      border: 1px solid #c7d9f8; border-radius: 8px;
      background: #f0f5ff; color: #2848b8; font-size: 0.83rem;
      cursor: pointer; transition: background .15s;
    }
    .q-submit-btn:hover { background: #e0e9ff; }
    /* Question stem */
    .q-stem { white-space: pre-wrap; font-size: 0.875rem; font-weight: 500; margin-bottom: 4px; }
    /* ── Result panels ───────────────────────────── */
    #result-area {
      border-top: 1px solid var(--border); padding: 10px 16px;
      background: var(--surface-2); max-height: 240px; overflow-y: auto;
    }
    /* ── Grade area ──────────────────────────────── */
    #grade-area { border-top: 1px solid var(--border); padding: 10px 16px; background: var(--surface-2); }
    /* ── Diagnosis panel ─────────────────────────── */
    #diagnosis-panel { flex: 1; overflow-y: auto; padding: 16px; }
    .hidden { display: none !important; }
    /* Typing dots */
    .typing-dot {
      display: inline-block; width: 7px; height: 7px; background: #94a3b8;
      border-radius: 50%; margin: 0 2px; animation: blink 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }
    .badge-correct { background: #16a34a !important; }
    .badge-wrong   { background: #dc2626 !important; }
    /* Chart container */
    #diag-chart-wrap { background: var(--surface); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  </style>
</head>
<body>

<!-- Top navbar -->
<nav id="topnav">
  <button class="nav-sidebar-toggle" id="sidebar-toggle-btn" title="收起/展开侧栏">
    <i class="bi bi-layout-sidebar"></i>
  </button>
  <span class="nav-brand"><i class="bi bi-mortarboard-fill"></i>考研智能辅导</span>
  <div class="nav-divider"></div>
  <div id="mode-tabs">
    <button class="active" data-mode="qa"><i class="bi bi-chat-dots me-1"></i>问答</button>
    <button data-mode="practice"><i class="bi bi-pencil-square me-1"></i>刷题</button>
    <button data-mode="diagnosis"><i class="bi bi-bar-chart-line me-1"></i>诊断</button>
  </div>
  <div class="nav-spacer"></div>
  <span id="nav-api-status">后端：<span id="api-url-display">http://localhost:8000</span></span>
  <div class="nav-divider"></div>
  <div id="nav-user">
    <div class="user-avatar" id="nav-avatar">?</div>
    <span class="user-name" id="nav-user-name">—</span>
    <button class="btn-logout" id="logout-btn"><i class="bi bi-box-arrow-right me-1"></i>退出</button>
  </div>
</nav>

<div id="app">
  <!-- Sidebar -->
  <aside id="sidebar">
    <div id="sidebar-inner">

      <!-- User profile card -->
      <div class="sidebar-user-card">
        <div class="sidebar-avatar" id="sidebar-avatar">?</div>
        <div class="sidebar-user-info">
          <div class="name" id="sidebar-display-name">—</div>
          <div class="uid" id="sidebar-user-id">—</div>
        </div>
      </div>

      <!-- Settings section -->
      <div class="sidebar-section">
        <div class="sidebar-label"><i class="bi bi-gear me-1"></i>设置</div>

        <div class="mb-2">
          <label class="form-label fw-semibold small mb-1 d-flex align-items-center gap-1">
            <i class="bi bi-hdd-network text-primary"></i> 后端地址
          </label>
          <input id="backend-url" type="text" class="form-control form-control-sm" value="http://localhost:8000" />
        </div>

        <div class="mb-2">
          <div class="form-check form-switch mb-1">
            <input class="form-check-input" type="checkbox" id="use-stream" checked />
            <label class="form-check-label small" for="use-stream">
              <i class="bi bi-lightning-charge text-warning me-1"></i>流式输出（SSE）
            </label>
          </div>
        </div>
      </div>

      <!-- Knowledge base section -->
      <div class="sidebar-section">
        <div class="sidebar-label"><i class="bi bi-database me-1"></i>知识库</div>
        <div class="form-check form-switch mb-1">
          <input class="form-check-input" type="checkbox" id="use-faiss" checked />
          <label class="form-check-label small" for="use-faiss">结构化知识库（FAISS）</label>
        </div>
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="use-chroma" />
          <label class="form-check-label small" for="use-chroma">动态笔记库（Chroma）</label>
        </div>
      </div>

      <hr class="my-2" />

      <!-- History section -->
      <div class="sidebar-section" style="flex:1;min-height:0;">
        <div class="sidebar-label"><i class="bi bi-clock-history me-1"></i>历史问题</div>
        <ul id="history-list" class="list-group list-group-flush small" style="overflow-y:auto;max-height:200px;"></ul>
      </div>

      <hr class="my-2" />
      <button id="clear-btn" class="btn btn-outline-secondary btn-sm w-100">
        <i class="bi bi-trash me-1"></i>清除对话
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <div id="main">

    <!-- ======== Q&A MODE ======== -->
    <div id="mode-qa" class="d-flex flex-column h-100">
      <div id="chat-box"></div>

      <!-- Citations / Recommendations result area -->
      <div id="result-area" class="hidden">
        <div class="row g-2">
          <div class="col-md-6">
            <div class="fw-semibold small mb-1 text-secondary"><i class="bi bi-card-list me-1"></i>引用来源</div>
            <div id="citations-list"></div>
          </div>
          <div class="col-md-6">
            <div class="fw-semibold small mb-1 text-secondary"><i class="bi bi-lightbulb me-1"></i>相关推荐</div>
            <div id="recommendations-list"></div>
          </div>
        </div>
      </div>

      <div class="input-bar">
        <textarea id="qa-input" rows="2"
          placeholder="输入问题，按 Enter 发送（Shift+Enter 换行）…"></textarea>
        <button id="qa-send" class="btn btn-primary btn-sm px-3">
          <i class="bi bi-send-fill"></i>
        </button>
      </div>
    </div>

    <!-- ======== PRACTICE MODE ======== -->
    <div id="mode-practice" class="d-flex flex-column h-100 hidden">
      <!-- Question display -->
      <div id="question-card">
        <div class="card" style="border-color: var(--border); border-radius: 10px;">
          <div class="card-header d-flex flex-wrap justify-content-between align-items-center gap-2" style="background:var(--surface-2);">
            <span class="fw-semibold small"><i class="bi bi-question-circle me-1 text-primary"></i>当前题目</span>
            <div class="d-flex flex-wrap gap-2 align-items-center">
              <select id="practice-subject" class="form-select form-select-sm" style="width:auto;">
                <option value="">选择科目…</option>
              </select>
              <select id="practice-type" class="form-select form-select-sm" style="width:auto;">
                <option value="">题型</option>
              </select>
              <select id="practice-year" class="form-select form-select-sm" style="width:auto;">
                <option value="">全部年份</option>
              </select>
              <button id="next-question-btn" class="btn btn-sm btn-outline-primary">
                <i class="bi bi-arrow-right-circle me-1"></i>换题
              </button>
            </div>
          </div>
          <div class="card-body" id="question-body">
            <div class="text-muted small">选择科目后点击「换题」加载题目…</div>
          </div>
        </div>
      </div>

      <!-- Practice chat / grading results -->
      <div id="practice-chat-box" class="flex-grow-1 px-3 pb-2" style="overflow-y:auto; background:var(--surface-2);"></div>

      <!-- Grade result area -->
      <div id="grade-area" class="hidden" style="border-top:1px solid var(--border);padding:10px 16px;background:var(--surface-2);">
        <div class="row g-2 align-items-start">
          <div class="col-auto">
            <span id="grade-badge" class="badge fs-6"></span>
          </div>
          <div class="col">
            <div class="small fw-semibold mb-1">批改意见</div>
            <div id="grade-feedback" class="small text-muted"></div>
          </div>
        </div>
        <div class="mt-2 hidden" id="followup-area">
          <div class="small fw-semibold mb-1">追问建议</div>
          <ul id="followup-list" class="mb-0 small"></ul>
        </div>
      </div>

      <div class="input-bar">
        <textarea id="practice-input" rows="2"
          placeholder="输入你的答案… Enter 提交，Shift+Enter 换行"></textarea>
        <button id="practice-send" class="btn btn-success btn-sm px-3">
          <i class="bi bi-check2-circle"></i>
        </button>
      </div>
    </div>

    <!-- ======== DIAGNOSIS MODE ======== -->
    <div id="mode-diagnosis" class="d-flex flex-column h-100 hidden">
      <div id="diagnosis-panel">
        <div class="d-flex gap-2 mb-3 align-items-center">
          <button id="run-diagnosis-btn" class="btn btn-warning btn-sm">
            <i class="bi bi-play-circle me-1"></i>运行学习诊断
          </button>
          <select id="diag-subject" class="form-select form-select-sm w-auto">
            <option value="">全部学科</option>
            <option value="数学">数学</option>
            <option value="政治">政治</option>
            <option value="英语">英语</option>
          </select>
          <div id="diag-loading" class="spinner-border spinner-border-sm text-warning hidden" role="status"></div>
        </div>

        <div id="diag-result" class="hidden">
          <!-- Report -->
          <div class="card mb-3" style="border-radius:10px;">
            <div class="card-header fw-semibold small" style="background:var(--surface-2);">
              <i class="bi bi-file-text me-1 text-primary"></i>诊断报告
            </div>
            <div class="card-body small" id="diag-report" style="white-space:pre-wrap;"></div>
          </div>

          <!-- Weak points chart -->
          <div id="diag-chart-wrap" class="hidden">
            <div class="fw-semibold small mb-3"><i class="bi bi-bar-chart-line me-1 text-danger"></i>薄弱知识点准确率</div>
            <canvas id="diag-chart" height="200"></canvas>
          </div>

          <!-- Weak points table -->
          <div class="card mb-3" style="border-radius:10px;">
            <div class="card-header fw-semibold small" style="background:var(--surface-2);">
              <i class="bi bi-exclamation-triangle me-1 text-danger"></i>薄弱知识点
            </div>
            <div class="card-body p-0">
              <table class="table table-sm table-hover mb-0" id="weak-points-table">
                <thead class="table-light">
                  <tr><th>知识点</th><th>学科</th><th>准确率</th><th>尝试次数</th><th>优先级</th></tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>

          <!-- Recommended questions -->
          <div class="card mb-3" style="border-radius:10px;">
            <div class="card-header fw-semibold small" style="background:var(--surface-2);">
              <i class="bi bi-collection me-1 text-primary"></i>推荐练习题
            </div>
            <div class="card-body p-0">
              <table class="table table-sm table-hover mb-0" id="rec-questions-table">
                <thead class="table-light">
                  <tr><th>ID</th><th>学科</th><th>知识点</th><th>难度</th><th>题目（截取）</th></tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>

          <!-- Recommended notes -->
          <div class="card mb-3" style="border-radius:10px;">
            <div class="card-header fw-semibold small" style="background:var(--surface-2);">
              <i class="bi bi-journals me-1 text-success"></i>推荐参考笔记
            </div>
            <div class="card-body p-0">
              <table class="table table-sm table-hover mb-0" id="rec-notes-table">

<script>

// ============================================================
// marked.js configuration (graceful fallback if CDN blocked)
// ============================================================
if (typeof marked !== 'undefined') {
  marked.setOptions({ breaks: true, gfm: false });
}

// Simple HTML sanitizer to prevent XSS in rendered Markdown
function sanitizeHtml(dirty) {
  const template = document.createElement('template');
  template.innerHTML = dirty;
  const FORBIDDEN_TAGS = ['script', 'iframe', 'object', 'embed', 'form', 'link', 'meta', 'base'];
  FORBIDDEN_TAGS.forEach(tag => {
    template.content.querySelectorAll(tag).forEach(el => el.remove());
  });
  template.content.querySelectorAll('*').forEach(el => {
    Array.from(el.attributes).forEach(attr => {
      if (/^on/i.test(attr.name)) el.removeAttribute(attr.name);
      if (attr.name === 'href' && /^\s*javascript:/i.test(attr.value)) el.removeAttribute(attr.name);
      if (attr.name === 'src' && /^\s*javascript:/i.test(attr.value)) el.removeAttribute(attr.name);
    });
  });
  return template.innerHTML;
}

function renderMarkdown(text) {
  if (typeof marked !== 'undefined') {
    return sanitizeHtml(marked.parse(text));
  }
  // Fallback: escape HTML and preserve line breaks
  return escHtml(text).replace(/\n/g, '<br>');
}

// ============================================================
// State
// ============================================================
const state = {
  mode: 'qa',           // 'qa' | 'practice' | 'diagnosis'
  messages: [],         // Q&A conversation history
  practiceMessages: [], // Practice conversation history
  currentQuestion: null,
  quizHistory: [],
  userId: _userId,
};

// ============================================================
// Helpers
// ============================================================
const backendUrl = () => document.getElementById('backend-url').value.replace(/\/$/, '');
const useFaiss   = () => document.getElementById('use-faiss').checked;
const useChroma  = () => document.getElementById('use-chroma').checked;
const useStream  = () => document.getElementById('use-stream').checked;

function apiUrl(path) { return backendUrl() + path; }

// Update display of backend URL in navbar
document.getElementById('backend-url').addEventListener('input', e => {
  document.getElementById('api-url-display').textContent = e.target.value;
});

// ============================================================
// Mode switching
// ============================================================
document.getElementById('mode-tabs').addEventListener('click', e => {
  const btn = e.target.closest('[data-mode]');
  if (!btn) return;
  switchMode(btn.dataset.mode);
});

function switchMode(mode) {
  state.mode = mode;
  document.querySelectorAll('#mode-tabs [data-mode]').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  document.getElementById('mode-qa').classList.toggle('hidden', mode !== 'qa');
  document.getElementById('mode-practice').classList.toggle('hidden', mode !== 'practice');
  document.getElementById('mode-diagnosis').classList.toggle('hidden', mode !== 'diagnosis');
  if (mode === 'practice') {
    initPracticeSelectors();
  }
}

// ============================================================
// Subject color helper
// ============================================================
function subjectTagHtml(subject) {
  if (!subject) return '';
  const isMath    = subject.includes('数学') || subject === 'math';
  const isPol     = subject.includes('政治') || subject === 'politics';
  const isEng     = subject.includes('英语') || subject === 'english';
  const cls = isMath ? 'subject-math' : isPol ? 'subject-politics' : isEng ? 'subject-english' : 'subject-default';
  return `<span class="subject-tag ${cls}">${escHtml(subject)}</span>`;
}

// ============================================================
// Chat rendering helpers
// ============================================================
function appendMessage(box, role, content) {
  const wrap = document.createElement('div');
  wrap.className = `msg-${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (role === 'assistant') {
    bubble.innerHTML = renderMarkdown(content);
  } else {
    bubble.textContent = content;
  }
  wrap.appendChild(bubble);
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
  return bubble;
}

function appendTypingIndicator(box) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-assistant';
  wrap.id = 'typing-indicator';
  wrap.innerHTML = `<div class="msg-bubble"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`;
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
  return wrap;
}

function removeTypingIndicator() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addToHistory(text) {
  const li = document.createElement('li');
  li.className = 'list-group-item list-group-item-action py-1 px-2 small text-truncate';
  li.title = text;
  li.textContent = text.slice(0, 40);
  li.style.cursor = 'pointer';
  li.addEventListener('click', () => {
    document.getElementById('qa-input').value = text;
    document.getElementById('qa-input').focus();
  });
  document.getElementById('history-list').prepend(li);
}

// ============================================================
// Q&A MODE
// ============================================================
const qaInput  = document.getElementById('qa-input');
const qaSend   = document.getElementById('qa-send');
const chatBox  = document.getElementById('chat-box');

qaInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQA(); }
});
qaSend.addEventListener('click', sendQA);

async function sendQA() {
  const text = qaInput.value.trim();
  if (!text) return;
  qaInput.value = '';
  appendMessage(chatBox, 'user', text);
  addToHistory(text);
  state.messages.push({ role: 'user', content: text });

  if (useStream()) {
    await sendQAStream(text);
  } else {
    await sendQASync(text);
  }
}

async function sendQASync(text) {
  appendTypingIndicator(chatBox);
  try {
    const resp = await fetch(apiUrl('/api/answer'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_input: text,
        messages: state.messages.slice(-10),
        use_faiss: useFaiss(),
        use_chroma: useChroma(),
      }),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    removeTypingIndicator();
    appendMessage(chatBox, 'assistant', data.answer);
    state.messages.push({ role: 'assistant', content: data.answer });
    renderResults(data.citations, data.recommendations);
  } catch (err) {
    removeTypingIndicator();
    appendMessage(chatBox, 'assistant', `❌ 请求失败：${err.message}`);
  }
}

async function sendQAStream(text) {
  appendTypingIndicator(chatBox);
  let fullText = '';
  let bubble = null;

  try {
    const resp = await fetch(apiUrl('/api/answer/stream'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_input: text,
        messages: state.messages.slice(-10),
        use_faiss: useFaiss(),
        use_chroma: useChroma(),
      }),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    removeTypingIndicator();
    const wrap = document.createElement('div');
    wrap.className = 'msg-assistant';
    wrap.innerHTML = '<div class="msg-bubble"></div>';
    chatBox.appendChild(wrap);
    bubble = wrap.querySelector('.msg-bubble');

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const payload = JSON.parse(line.slice(6));
            if (payload.token) {
              fullText += payload.token;
              bubble.innerHTML = renderMarkdown(fullText);
              chatBox.scrollTop = chatBox.scrollHeight;
            }
          } catch {}
        }
      }
    }
    state.messages.push({ role: 'assistant', content: fullText });
  } catch (err) {
    removeTypingIndicator();
    appendMessage(chatBox, 'assistant', `❌ 流式请求失败：${err.message}`);
  }
}

function renderResults(citations, recommendations) {
  const area = document.getElementById('result-area');
  const citList = document.getElementById('citations-list');
  const recList  = document.getElementById('recommendations-list');
  citList.innerHTML = '';
  recList.innerHTML = '';

  if (citations && citations.length) {
    citations.forEach(c => {
      const div = document.createElement('div');
      div.className = 'border rounded p-1 mb-1 small';
      div.innerHTML = `<span class="badge bg-secondary me-1">[${c.index}]</span><strong>${escHtml(c.source)}</strong><br><span class="text-muted">${escHtml(c.content_snippet)}</span>`;
      citList.appendChild(div);
    });
  } else {
    citList.innerHTML = '<div class="text-muted small">无引用来源</div>';
  }

  if (recommendations && recommendations.length) {
    recommendations.forEach(r => {
      const div = document.createElement('div');
      div.className = 'border rounded p-1 mb-1 small';
      div.innerHTML = `${subjectTagHtml(r.subject)} ${escHtml(r.content_snippet.slice(0,80))}…`;
      recList.appendChild(div);
    });
  } else {
    recList.innerHTML = '<div class="text-muted small">无推荐内容</div>';
  }

  area.classList.remove('hidden');
}

// ============================================================
// PRACTICE MODE
// ============================================================
const practiceInput = document.getElementById('practice-input');
const practiceSend  = document.getElementById('practice-send');
const practiceChat  = document.getElementById('practice-chat-box');
const practiceSubjectSel = document.getElementById('practice-subject');
const practiceTypeSel    = document.getElementById('practice-type');
const practiceYearSel    = document.getElementById('practice-year');

// --- Bootstrap selectors from new API ---
async function initPracticeSelectors() {

}

async function loadPracticeTypes() {

document.getElementById('next-question-btn').addEventListener('click', loadQuestion);
practiceInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitAnswer(); }
});
practiceSend.addEventListener('click', submitAnswer);

async function loadQuestion() {
  try {
    const subject = practiceSubjectSel.value;
    const qtype   = practiceTypeSel.value;
    const year    = practiceYearSel.value;
    const params  = new URLSearchParams();
    if (subject) params.set('subject', subject);
    if (qtype)   params.set('question_type', qtype);
    if (year)    params.set('year', year);
    const url = apiUrl('/api/practice/question') + (params.toString() ? '?' + params.toString() : '');
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const q = await resp.json();
    state.currentQuestion = q;
    renderQuestion(q);
    practiceChat.innerHTML = '';
    document.getElementById('grade-area').classList.add('hidden');
  } catch (err) {
    document.getElementById('question-body').innerHTML =
      `<span class="text-danger small">❌ 获取题目失败：${err.message}</span>`;
  }
}

function renderQuestion(q) {
  const body = document.getElementById('question-body');

  // Build the header badges
  const kp = (q.knowledge_points || []).map(k =>
    `<span class="badge bg-light text-dark border me-1">${escHtml(k)}</span>`
  ).join('');
  const headerHtml = `
    <div class="d-flex gap-2 mb-2 flex-wrap align-items-center">
      ${subjectTagHtml(q.subject)}
      ${q.year ? `<span class="badge bg-secondary">${q.year}年</span>` : ''}
      ${q.question_type ? `<span class="badge bg-info text-dark">${escHtml(q.question_type)}</span>` : ''}
      ${kp}
    </div>`;

  // Passage block for English questions
  const passageHtml = q.passage_text
    ? `<div class="q-passage">${escHtml(q.passage_text)}</div>`
    : '';

  // Question stem
  const stemHtml = `<div class="q-stem">${escHtml(q.content)}</div>`;

  body.innerHTML = headerHtml + passageHtml + stemHtml;

  // --- Material analysis: render sub-questions as an accordion ---
  const subQs = Array.isArray(q.sub_questions) ? q.sub_questions : [];
  if (subQs.length > 0) {
    const subDiv = document.createElement('div');
    subDiv.className = 'mt-2';
    subQs.forEach((sq, idx) => {
      const panel = document.createElement('div');
      panel.className = 'border rounded p-2 mb-2 small';
      const numLabel = sq.number ? `第(${sq.number})问 ` : `小问${idx + 1} `;
      const stemEl = document.createElement('div');
      stemEl.className = 'fw-semibold mb-1 q-stem';
      stemEl.textContent = numLabel + (sq.stem || '');
      panel.appendChild(stemEl);

      if (sq.answer) {
        const showBtn = document.createElement('button');
        showBtn.className = 'q-submit-btn mt-1';
        showBtn.textContent = '查看答案';
        const ansEl = document.createElement('div');
        ansEl.className = 'q-answer-box';
        showBtn.addEventListener('click', () => {
          if (ansEl.classList.contains('show')) {
            ansEl.classList.remove('show');
            showBtn.textContent = '查看答案';
          } else {
            ansEl.className = 'q-answer-box show';
            ansEl.innerHTML = `参考答案：${escHtml(sq.answer)}`;
            showBtn.textContent = '隐藏答案';
            if (window.MathJax && window.MathJax.typesetPromise) {
              window.MathJax.typesetPromise([ansEl]).catch(() => {});
            }
          }
        });
        panel.appendChild(showBtn);
        panel.appendChild(ansEl);
      }
      subDiv.appendChild(panel);
    });
    body.appendChild(subDiv);

    if (window.MathJax && window.MathJax.typesetPromise) {
      window.MathJax.typesetPromise([body]).catch(() => {});
    }
    return;
  }

  // --- Options block for multiple-choice questions ---
  const opts = q.options && typeof q.options === 'object' ? q.options : null;
  if (opts && Object.keys(opts).length > 0) {
    const optionsDiv = document.createElement('div');
    optionsDiv.className = 'q-options';

    const sortedKeys = Object.keys(opts).sort();
    let answered = false;

    sortedKeys.forEach(key => {
      const item = document.createElement('div');
      item.className = 'q-option';
      item.dataset.key = key;

      const badge = document.createElement('div');
      badge.className = 'q-option-badge';
      badge.textContent = key;

      const textEl = document.createElement('div');
      textEl.style.whiteSpace = 'pre-wrap';
      textEl.textContent = opts[key];

      item.appendChild(badge);
      item.appendChild(textEl);

      const isMultiple = (q.question_type || '').includes('多选');

      item.addEventListener('click', () => {
        if (answered) return;
        if (isMultiple) {
          item.classList.toggle('selected');
        } else {
          optionsDiv.querySelectorAll('.q-option').forEach(el => el.classList.remove('selected'));
          item.classList.add('selected');
        }
      });

      optionsDiv.appendChild(item);
    });

    body.appendChild(optionsDiv);

    // Answer box (hidden until submitted)
    const answerBox = document.createElement('div');
    answerBox.className = 'q-answer-box';
    body.appendChild(answerBox);

    // Submit button for inline answer checking
    const submitBtn = document.createElement('button');
    submitBtn.className = 'q-submit-btn';
    submitBtn.textContent = '提交选项';
    submitBtn.addEventListener('click', () => {
      if (answered) return;
      const correctAns = (q.correct_answer || '').toUpperCase().split('').sort().join('');
      const selectedItems = optionsDiv.querySelectorAll('.q-option.selected');
      if (selectedItems.length === 0) return;
      answered = true;

      const pickedKeys = Array.from(selectedItems).map(el => el.dataset.key).sort().join('');

      sortedKeys.forEach(key => {
        const el = optionsDiv.querySelector(`.q-option[data-key="${key}"]`);
        if (!el) return;
        el.style.pointerEvents = 'none';
        if (correctAns.includes(key)) {
          el.classList.add('correct');
          el.classList.remove('selected', 'wrong');
        } else if (el.classList.contains('selected')) {
          el.classList.add('wrong');
          el.classList.remove('selected');
        }
      });

      const isOk = pickedKeys === correctAns;
      answerBox.className = 'q-answer-box show' + (isOk ? '' : ' wrong-ans');
      const resultLine = `参考答案：${escHtml(correctAns || '（暂无）')} ｜ 你的选择：${escHtml(pickedKeys)} ｜ ${isOk ? '✅ 正确' : '❌ 错误'}`;
      const analysisLine = q.analysis
        ? `<div class="mt-1" style="white-space:pre-wrap;">解析：${escHtml(q.analysis)}</div>`
        : '';
      answerBox.innerHTML = resultLine + analysisLine;

      submitBtn.disabled = true;

      if (window.MathJax && window.MathJax.typesetPromise) {
        window.MathJax.typesetPromise([answerBox]).catch(() => {});
      }
    });
    body.appendChild(submitBtn);
  }

  // Run MathJax over the whole question card after rendering
  if (window.MathJax && window.MathJax.typesetPromise) {
    window.MathJax.typesetPromise([body]).catch(() => {});
  }
}

async function submitAnswer() {
  const text = practiceInput.value.trim();
  if (!text) return;
  practiceInput.value = '';
  appendMessage(practiceChat, 'user', text);

  if (useStream()) {
    await submitAnswerStream(text);
  } else {
    await submitAnswerSync(text);
  }
}

async function submitAnswerSync(text) {
  appendTypingIndicator(practiceChat);
  try {
    const resp = await fetch(apiUrl('/api/practice'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_input: text,
        current_question: state.currentQuestion,
        user_answer: text,
        messages: state.practiceMessages,
        quiz_history: state.quizHistory,
      }),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    removeTypingIndicator();
    appendMessage(practiceChat, 'assistant', data.explanation || '（无解析）');
    state.practiceMessages = data.messages;
    state.quizHistory = data.quiz_history;
    renderGradeResult(data.grade_result, data.followup_questions);
  } catch (err) {
    removeTypingIndicator();
    appendMessage(practiceChat, 'assistant', `❌ 提交失败：${err.message}`);
  }
}

async function submitAnswerStream(text) {
  appendTypingIndicator(practiceChat);
  let fullText = '';

  try {
    const resp = await fetch(apiUrl('/api/practice/stream'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_input: text,
        current_question: state.currentQuestion,
        user_answer: text,
        messages: state.practiceMessages,
        quiz_history: state.quizHistory,
      }),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    removeTypingIndicator();
    const wrap = document.createElement('div');
    wrap.className = 'msg-assistant';
    wrap.innerHTML = '<div class="msg-bubble"></div>';
    practiceChat.appendChild(wrap);
    const bubble = wrap.querySelector('.msg-bubble');

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let gradeResult = null;
    let followups = [];

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      let eventType = '';
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7).trim();
        } else if (line.startsWith('data: ')) {
          try {
            const payload = JSON.parse(line.slice(6));
            if (eventType === 'meta') {
              gradeResult = payload.grade_result;
              followups   = payload.followup_questions || [];
            } else if (eventType === 'token' && payload.token) {
              fullText += payload.token;
              bubble.innerHTML = renderMarkdown(fullText);
              practiceChat.scrollTop = practiceChat.scrollHeight;
            }
          } catch {}
          eventType = '';
        }
      }
    }

    if (gradeResult) renderGradeResult(gradeResult, followups);
  } catch (err) {
    removeTypingIndicator();
    appendMessage(practiceChat, 'assistant', `❌ 流式提交失败：${err.message}`);
  }
}

function renderGradeResult(grade, followups) {
  const area = document.getElementById('grade-area');
  const badge = document.getElementById('grade-badge');
  const feedback = document.getElementById('grade-feedback');
  const followupList = document.getElementById('followup-list');

  const scoreStr = grade.score != null ? `  ${grade.score}分` : '';
  if (grade.is_correct === true) {
    badge.className = 'badge badge-correct fs-6';
    badge.textContent = `✓ 正确${scoreStr}`;
  } else if (grade.is_correct === false) {
    badge.className = 'badge badge-wrong fs-6';
    badge.textContent = `✗ 错误${scoreStr}`;
  } else {
    badge.className = 'badge bg-warning text-dark fs-6';
    badge.textContent = `待评${scoreStr}`;
  }

  feedback.textContent = grade.feedback || '';
  followupList.innerHTML = '';
  if (followups && followups.length) {
    followups.forEach(q => {
      const li = document.createElement('li');
      li.textContent = q;
      followupList.appendChild(li);
    });
    document.getElementById('followup-area').classList.remove('hidden');
  }

  area.classList.remove('hidden');
}

// ============================================================
// DIAGNOSIS MODE
// ============================================================
let diagChart = null;

document.getElementById('run-diagnosis-btn').addEventListener('click', runDiagnosis);

async function runDiagnosis() {
  const subject = document.getElementById('diag-subject').value;
  const loading = document.getElementById('diag-loading');
  const result  = document.getElementById('diag-result');

  loading.classList.remove('hidden');
  result.classList.add('hidden');

  try {
    const resp = await fetch(apiUrl('/diagnosis/run'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_id: state.userId,
        subject: subject || null,
      }),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    renderDiagnosis(data);
  } catch (err) {
    alert(`❌ 诊断失败：${err.message}`);
  } finally {
    loading.classList.add('hidden');
  }
}

function renderDiagnosis(data) {
  document.getElementById('diag-report').textContent = data.report || '';

  // Weak points chart
  const weakPoints = data.weak_points || [];
  const chartWrap = document.getElementById('diag-chart-wrap');
  if (weakPoints.length > 0 && typeof Chart !== 'undefined') {
    chartWrap.classList.remove('hidden');
    const labels = weakPoints.map(wp => wp.knowledge_point);
    const values = weakPoints.map(wp => Math.round(wp.accuracy * 100));
    const colors = weakPoints.map(wp =>
      wp.priority === 'high'   ? 'rgba(239,68,68,0.8)'  :
      wp.priority === 'medium' ? 'rgba(245,158,11,0.8)' : 'rgba(16,185,129,0.8)'
    );
    const ctx = document.getElementById('diag-chart').getContext('2d');
    if (diagChart) diagChart.destroy();
    diagChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: '准确率 (%)',
          data: values,
          backgroundColor: colors,
          borderRadius: 4,
        }],
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { min: 0, max: 100, ticks: { callback: v => v + '%' } },
        },
      },
    });
  } else {
    chartWrap.classList.add('hidden');
  }

  // Weak points table
  const wpTbody = document.querySelector('#weak-points-table tbody');
  wpTbody.innerHTML = '';
  weakPoints.forEach(wp => {
    const tr = document.createElement('tr');
    const priorityClass = wp.priority === 'high' ? 'text-danger fw-bold' : wp.priority === 'medium' ? 'text-warning' : '';
    tr.innerHTML = `
      <td>${escHtml(wp.knowledge_point)}</td>
      <td>${subjectTagHtml(wp.subject)}</td>
      <td>${(wp.accuracy * 100).toFixed(0)}%</td>
      <td>${wp.total_attempts}</td>
      <td class="${priorityClass}">${escHtml(wp.priority)}</td>`;
    wpTbody.appendChild(tr);
  });

  // Recommended questions
  const rqTbody = document.querySelector('#rec-questions-table tbody');
  rqTbody.innerHTML = '';
  (data.recommended_questions || []).forEach(q => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${q.id}</td>
      <td>${subjectTagHtml(q.subject)}</td>
      <td>${escHtml(q.knowledge_point || '')}</td>
      <td>${escHtml(q.difficulty_level || '')}</td>
      <td class="text-truncate" style="max-width:240px;" title="${escHtml(q.content)}">${escHtml(q.content.slice(0,60))}…</td>`;
    rqTbody.appendChild(tr);
  });

  // Recommended notes
  const rnTbody = document.querySelector('#rec-notes-table tbody');
  rnTbody.innerHTML = '';
  (data.recommended_notes || []).forEach(n => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="text-truncate" style="max-width:100px;">${escHtml(n.doc_id)}</td>
      <td>${subjectTagHtml(n.subject)}</td>
      <td>${escHtml(n.note_type)}</td>
      <td class="text-truncate" style="max-width:240px;" title="${escHtml(n.content_snippet)}">${escHtml(n.content_snippet.slice(0,80))}…</td>`;
    rnTbody.appendChild(tr);
  });

  document.getElementById('diag-result').classList.remove('hidden');
}

// ============================================================
// Clear conversation
// ============================================================
document.getElementById('clear-btn').addEventListener('click', () => {
  state.messages = [];
  state.practiceMessages = [];
  state.quizHistory = [];
  chatBox.innerHTML = '';
  practiceChat.innerHTML = '';
  document.getElementById('result-area').classList.add('hidden');
  document.getElementById('grade-area').classList.add('hidden');
  document.getElementById('history-list').innerHTML = '';
});
</script>
