# -----------------------------------------------------------------------
# 考研智能辅导系统 — nginx 前端配置
# 同时将 /api 和 /diagnosis 路径反向代理到后端服务
# -----------------------------------------------------------------------

# 公共代理参数（通过 map/include 不易在 server block 内提取，改为注释说明）
# proxy_read_timeout 120s 适用于 SSE 长连接

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 静态资源
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 反向代理 — API 路由
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 支持 SSE 流式响应
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
    }

    # 反向代理 — 诊断路由
    location /diagnosis/ {
        proxy_pass http://backend:8000/diagnosis/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
    }

    # 反向代理 — 健康检查与笔记路由
    location ~ ^/(health|notes)(/|$) {
        proxy_pass http://backend:8000$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
    }
}
